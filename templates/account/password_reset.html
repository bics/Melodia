{% extends 'base.html' %}
{% load static %}


{% block main %}
<div class="spacer m-3"></div>


<!--Code block copied from previous CoffeeHouse project-->
<dic class="container d-flex justify-content-center">
    <div class="slightly-darker-graphite-background rounded p-3">
        <!--Form code block was generated using ChatGPT-->
        <div class="text-center">
            <h2>Reset password</h2>
            <hr>
            <p>
                To reset your password, type in your email address.
            </p>
        </div>
        <form id="reset-password-form" method="POST" class="w-100 text-center">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="w-100">
                <hr>
                <div class="d-flex justify-content-between">
                    <a class="btn btn-secondary navigation-button" href="{% url 'account_login'  %}">Back</a>
                    <input class="btn btn-danger navigation-button" type="submit" value="Reset">
                </div>
            </div>
        </form>
    </div>
</dic>

{% endblock %}
