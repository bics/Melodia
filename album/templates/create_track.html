{% extends 'base.html' %}
{% load static %}

{% block main %}
<div class="spacer m-3"></div>

{{ STATIC_URL }}

<div class="container text-center slightly-darker-graphite-background rounded">
    <h3>Create Tracks</h3>
    <div class="spacer m-3">
        <hr class="color-platinum line-break">
    </div>

    <div class="container one-third-width">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <!--Formset render generated using ChatGPT-->
            {{ formset.management_form }}

            {% for form in formset %}
            <div class="collapse {% if forloop.first %}show{% endif %}" id="track-{{ forloop.counter }}">
                <div class="card card-body mb-3">
                    {{ form.as_p }}
                </div>
            </div>
            {% endfor %}

            <button type="button" id="remove-track-form" class="btn btn-danger mb-3" data-bs-toggle="collapse" data-bs-target="#track-2">-</button>
            <button type="button" id="add-track-form" class="btn btn-success mb-3" data-bs-toggle="collapse" data-bs-target="#track-2">+</button>

            <div class="d-flex justify-content-around">
                <a href="{% url 'artist' artist.name artist.id %}" class="btn btn-danger mb-3">Back</a>
                <button type="submit" class="btn btn-success mb-3">Create</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{% static 'assets/album/js/formset_jumper.js' %}"></script>
{% endblock %}
